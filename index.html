<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Red Eléctrica ESP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { background-color: #05070a; color: #e2e8f0; overflow-x: hidden; }
        .radar-pulse {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos integrados
        const Icons = {
            Zap: () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            Wind: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>,
            Sun: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            Flame: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
        };

        const EnergyBar = ({ label, value, icon, color }) => (
            <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-800 mb-4">
                <div className="flex justify-between items-center mb-3">
                    <div className="flex items-center gap-3">
                        <div className={`p-2 rounded-lg ${color} bg-opacity-10 text-slate-200`}>{icon}</div>
                        <span className="text-sm font-semibold">{label}</span>
                    </div>
                    <span className="font-mono font-bold text-lg">{value}%</span>
                </div>
                <div className="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                    <div className={`h-full ${color} transition-all duration-1000`} style={{ width: `${value}%` }}></div>
                </div>
            </div>
        );

        const SpainEnergyMonitor = () => {
            const [price, setPrice] = useState(0.145);
            const mix = { solar: 35, wind: 40, gas: 15 };

            useEffect(() => {
                const interval = setInterval(() => {
                    setPrice(prev => +(prev + (Math.random() * 0.01 - 0.005)).toFixed(3));
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 relative">
                    <div className="fixed top-0 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] -z-10"></div>
                    
                    <header className="max-w-6xl mx-auto flex justify-between items-center mb-10 border-b border-slate-800 pb-6">
                        <div>
                            <h1 className="text-3xl font-black tracking-tighter flex items-center gap-2">
                                <div className="h-3 w-3 bg-red-500 rounded-full animate-pulse"></div>
                                RED ELÉCTRICA <span className="text-blue-500 italic">ESP</span>
                            </h1>
                            <p className="text-slate-500 text-sm font-mono mt-1">ESTADO: ONLINE | CONEXIÓN SEGURA</p>
                        </div>
                        <div className="bg-slate-900/40 border border-slate-800 p-4 rounded-xl">
                            <p className="text-[10px] text-slate-500 uppercase font-bold tracking-widest text-right">Precio Actual</p>
                            <p className="text-2xl font-mono font-bold text-emerald-400">{price} €/kWh</p>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="space-y-2">
                            <h2 className="text-sm font-bold uppercase tracking-widest text-slate-400 mb-6 flex items-center gap-2">
                                <Icons.Zap /> Generación en Tiempo Real
                            </h2>
                            <EnergyBar label="Eólica" value={mix.wind} icon={<Icons.Wind/>} color="bg-cyan-500" />
                            <EnergyBar label="Solar" value={mix.solar} icon={<Icons.Sun/>} color="bg-amber-400" />
                            <EnergyBar label="Ciclo Combinado" value={mix.gas} icon={<Icons.Flame/>} color="bg-orange-600" />
                        </div>

                        {/* Visor de Mapa Estilizado */}
                        <div className="lg:col-span-2 bg-slate-900/30 border border-slate-800 rounded-2xl p-6 relative flex flex-col items-center justify-center min-h-[400px]">
                            <h3 className="absolute top-6 left-6 text-sm font-bold text-slate-400 uppercase tracking-widest">Nodos de Red Activos</h3>
                            
                            {/* Representación gráfica de la Península con Nodos */}
                            <div className="relative w-full max-w-md aspect-square mt-8">
                                {/* Silueta muy básica de España en SVG */}
                                <svg viewBox="0 0 100 100" className="w-full h-full opacity-20" fill="#334155">
                                    <path d="M20,20 L80,20 L90,80 L40,90 L10,60 Z" />
                                </svg>
                                
                                {/* Nodo Galicia */}
                                <div className="absolute top-[25%] left-[20%] flex flex-col items-center">
                                    <div className="relative">
                                        <div className="w-4 h-4 bg-cyan-400 rounded-full z-10 relative"></div>
                                        <div className="absolute inset-0 bg-cyan-400 rounded-full radar-pulse"></div>
                                    </div>
                                    <span className="text-[10px] font-bold mt-2 text-cyan-400 bg-slate-900 px-2 rounded">GALICIA: +400MW</span>
                                </div>

                                {/* Nodo Andalucía */}
                                <div className="absolute bottom-[25%] left-[45%] flex flex-col items-center">
                                    <div className="relative">
                                        <div className="w-4 h-4 bg-amber-400 rounded-full z-10 relative"></div>
                                        <div className="absolute inset-0 bg-amber-400 rounded-full radar-pulse"></div>
                                    </div>
                                    <span className="text-[10px] font-bold mt-2 text-amber-400 bg-slate-900 px-2 rounded">ANDALUCÍA: +SOLAR</span>
                                </div>
                                
                                {/* Nodo Madrid */}
                                <div className="absolute top-[45%] left-[50%] flex flex-col items-center">
                                    <div className="w-3 h-3 bg-red-500 rounded-full"></div>
                                    <span className="text-[10px] font-bold mt-1 text-slate-300">MADRID: ALTA DEMANDA</span>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SpainEnergyMonitor />);
    </script>
</body>
</html>
