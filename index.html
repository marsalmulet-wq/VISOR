<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Red Eléctrica ESP</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#05070a] text-slate-200 overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Iconos SVG (Reemplazan a Lucide para que funcione sin instalar nada)
        const Icons = {
            Zap: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>,
            TrendingDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline><polyline points="16 17 22 17 22 11"></polyline></svg>,
            Wind: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></svg>,
            Sun: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>,
            Flame: () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></svg>,
            MapIcon: ({size = 24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/><line x1="9" x2="9" y1="3" y2="18"/><line x1="15" x2="15" y1="6" y2="21"/></svg>
        };

        const EnergyBar = ({ label, value, icon, color, shadow }) => (
            <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-800 hover:border-slate-700 transition-all group">
                <div className="flex justify-between items-center mb-3">
                    <div className="flex items-center gap-3">
                        <div className={`p-2 rounded-lg ${color} bg-opacity-10 text-slate-200 group-hover:scale-110 transition-transform`}>
                            {icon}
                        </div>
                        <span className="text-sm font-semibold">{label}</span>
                    </div>
                    <span className="font-mono font-bold text-lg">{value}%</span>
                </div>
                <div className="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                    <div 
                        className={`h-full ${color} ${shadow} shadow-lg transition-all duration-1000 ease-out`} 
                        style={{ width: `${value}%` }}
                    ></div>
                </div>
            </div>
        );

        const SpainEnergyMonitor = () => {
            const [price, setPrice] = useState(0.145);
            const mix = { solar: 35, wind: 40, gas: 15, nuclear: 10 };

            // Simulador del precio en vivo
            useEffect(() => {
                const interval = setInterval(() => {
                    setPrice(prev => +(prev + (Math.random() * 0.01 - 0.005)).toFixed(3));
                }, 3000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans relative">
                    {/* Efectos de fondo */}
                    <div className="fixed top-0 left-1/4 w-96 h-96 bg-blue-600/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
                    <div className="fixed bottom-0 right-1/4 w-96 h-96 bg-amber-600/10 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

                    <header className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-10">
                        <div>
                            <div className="flex items-center gap-2 mb-1">
                                <span className="relative flex h-3 w-3">
                                    <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                                    <span className="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
                                </span>
                                <h1 className="text-3xl font-black tracking-tighter">RED ELÉCTRICA <span className="text-blue-500 italic">ESP</span></h1>
                            </div>
                            <p className="text-slate-500 text-sm font-mono">LIVE_DATA_STREAM: RED_SISTEMA_NACIONAL</p>
                        </div>

                        <div className="bg-slate-900/40 backdrop-blur-xl border border-slate-800 p-4 rounded-2xl flex items-center gap-6">
                            <div className="text-right">
                                <p className="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Precio Actual PVPC</p>
                                <p className="text-2xl font-mono font-bold text-emerald-400">{price} €<span className="text-xs">/kWh</span></p>
                            </div>
                            <div className="text-emerald-400 animate-bounce"><Icons.TrendingDown /></div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Panel de Energía */}
                        <div className="space-y-4">
                            <h2 className="text-sm font-bold uppercase tracking-widest text-slate-400 mb-4 flex items-center gap-2">
                                <Icons.Zap /> Mix Energético Actual
                            </h2>
                            <EnergyBar label="Eólica" value={mix.wind} icon={<Icons.Wind/>} color="bg-cyan-500" shadow="shadow-cyan-500/40" />
                            <EnergyBar label="Solar Fotovoltaica" value={mix.solar} icon={<Icons.Sun/>} color="bg-amber-400" shadow="shadow-amber-400/40" />
                            <EnergyBar label="Ciclo Combinado (Gas)" value={mix.gas} icon={<Icons.Flame/>} color="bg-orange-600" shadow="shadow-orange-600/40" />
                        </div>

                        {/* Visor Central */}
                        <div className="lg:col-span-2 relative flex items-center justify-center bg-slate-900/20 border border-slate-800/50 rounded-[2rem] p-8 min-h-[450px]">
                            <div className="absolute inset-0 opacity-10 flex items-center justify-center overflow-hidden pointer-events-none">
                                <Icons.MapIcon size="400" className="text-slate-700" />
                            </div>
                            
                            <div className="relative z-10 text-center">
                                <div className="mb-6 inline-flex p-4 bg-blue-500/10 border border-blue-500/20 rounded-full">
                                    <Icons.MapIcon size="32" className="text-blue-400" />
                                </div>
                                <h3 className="text-2xl font-bold mb-2">Visor Cartográfico Interactivo</h3>
                                <p className="text-slate-400 max-w-sm mx-auto text-sm leading-relaxed">
                                    El visor está listo. Aquí renderizaremos el mapa vectorial de España con los flujos de energía.
                                </p>
                                <div className="mt-8 flex gap-3 justify-center">
                                    <span className="px-4 py-2 bg-slate-800 rounded-full text-xs border border-slate-700 font-bold text-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.2)]">GALICIA: EXPORTANDO</span>
                                    <span className="px-4 py-2 bg-slate-800 rounded-full text-xs border border-slate-700 font-bold text-amber-400 shadow-[0_0_15px_rgba(251,191,36,0.2)]">ANDALUCÍA: +SOLAR</span>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SpainEnergyMonitor />);
    </script>
</body>
</html>
