<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Red Eléctrica ESP</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --bg-color: #05070a;
            --panel-bg: rgba(15, 23, 42, 0.6);
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-cyan: #06b6d4;
            --accent-red: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(245, 158, 11, 0.05) 0%, transparent 50%);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .title-group h1 { font-weight: 900; font-size: 32px; letter-spacing: -1px; }
        .title-group h1 span { color: var(--accent-blue); font-style: italic; }
        .subtitle { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin-top: 5px; }
        
        .live-dot {
            display: inline-block; width: 10px; height: 10px; background: var(--accent-red);
            border-radius: 50%; margin-right: 10px;
            box-shadow: 0 0 10px var(--accent-red);
            animation: pulse 1.5s infinite;
        }

        .price-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 15px 25px;
            border-radius: 12px;
            text-align: right;
            backdrop-filter: blur(10px);
        }

        .price-box p { font-size: 10px; text-transform: uppercase; color: var(--text-muted); font-weight: bold; letter-spacing: 1px; }
        .price-value { font-family: 'JetBrains Mono', monospace; font-size: 28px; color: var(--accent-green); font-weight: bold; }

        /* Grid Principal */
        .main-grid { display: grid; grid-template-columns: 1fr 2fr; gap: 30px; }
        @media (max-width: 768px) { .main-grid { grid-template-columns: 1fr; } }

        /* Barras de Energía */
        .energy-panel { display: flex; flex-direction: column; gap: 15px; }
        .energy-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 16px;
        }
        
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;}
        .card-title { font-size: 14px; font-weight: bold; }
        .card-value { font-family: 'JetBrains Mono', monospace; font-size: 20px; font-weight: bold; }

        .progress-bg { width: 100%; height: 8px; background: #0f172a; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 1s ease-in-out; }

        .wind .progress-fill { background: var(--accent-cyan); box-shadow: 0 0 15px var(--accent-cyan); }
        .wind .card-value { color: var(--accent-cyan); }
        
        .solar .progress-fill { background: var(--accent-yellow); box-shadow: 0 0 15px var(--accent-yellow); }
        .solar .card-value { color: var(--accent-yellow); }
        
        .gas .progress-fill { background: var(--accent-red); box-shadow: 0 0 15px var(--accent-red); }
        .gas .card-value { color: var(--accent-red); }

        /* Mapa de España Vectorial (Hecho a mano en SVG para no usar archivos externos) */
        .map-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 400px;
            padding: 20px;
        }

        .map-container { position: relative; width: 100%; max-width: 500px; }
        
        .spain-svg { width: 100%; height: auto; filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.1)); }
        .spain-path { fill: #0f172a; stroke: #334155; stroke-width: 2; transition: all 0.3s; }
        .spain-path:hover { fill: rgba(59, 130, 246, 0.2); stroke: var(--accent-blue); }

        /* Nodos en el mapa */
        .node { position: absolute; display: flex; flex-direction: column; align-items: center; transform: translate(-50%, -50%); }
        .node-dot { width: 12px; height: 12px; border-radius: 50%; position: relative; z-index: 2; }
        .node-pulse { position: absolute; inset: -5px; border-radius: 50%; animation: ping 2s cubic-bezier(0, 0, 0.2, 1) infinite; z-index: 1; }
        .node-label { margin-top: 8px; font-size: 10px; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: rgba(0,0,0,0.8); border: 1px solid var(--border-color); white-space: nowrap;}

        .node.galicia { top: 20%; left: 15%; }
        .node.galicia .node-dot, .node.galicia .node-pulse { background: var(--accent-cyan); }
        .node.galicia .node-label { color: var(--accent-cyan); }

        .node.andalucia { top: 80%; left: 45%; }
        .node.andalucia .node-dot, .node.andalucia .node-pulse { background: var(--accent-yellow); }
        .node.andalucia .node-label { color: var(--accent-yellow); }

        .node.madrid { top: 50%; left: 48%; }
        .node.madrid .node-dot, .node.madrid .node-pulse { background: var(--accent-red); }
        .node.madrid .node-label { color: var(--accent-red); }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="title-group">
                <h1><span class="live-dot"></span>RED ELÉCTRICA <span>ESP</span></h1>
                <p class="subtitle">SISTEMA_NACIONAL // DATOS_TIEMPO_REAL</p>
            </div>
            <div class="price-box">
                <p>Precio Actual PVPC</p>
                <div class="price-value"><span id="price-val">0.145</span> €/kWh</div>
            </div>
        </header>

        <div class="main-grid">
            <div class="energy-panel">
                <div class="energy-card wind">
                    <div class="card-header">
                        <span class="card-title">Eólica</span>
                        <span class="card-value"><span id="wind-val">42</span>%</span>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" id="wind-bar" style="width: 42%;"></div></div>
                </div>

                <div class="energy-card solar">
                    <div class="card-header">
                        <span class="card-title">Solar Fotovoltaica</span>
                        <span class="card-value"><span id="solar-val">35</span>%</span>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" id="solar-bar" style="width: 35%;"></div></div>
                </div>

                <div class="energy-card gas">
                    <div class="card-header">
                        <span class="card-title">Ciclo Combinado (Gas)</span>
                        <span class="card-value"><span id="gas-val">12</span>%</span>
                    </div>
                    <div class="progress-bg"><div class="progress-fill" id="gas-bar" style="width: 12%;"></div></div>
                </div>
            </div>

            <div class="map-panel">
                <span style="position: absolute; top: 20px; left: 20px; font-size: 12px; color: var(--text-muted); font-weight: bold; letter-spacing: 1px;">VISOR TOPOLÓGICO</span>
                
                <div class="map-container">
                    <svg viewBox="0 0 100 100" class="spain-svg">
                        <path class="spain-path" d="M15,10 L35,8 L65,15 L85,25 L95,45 L90,70 L70,90 L40,95 L25,85 L15,70 L10,50 L5,25 Z" />
                    </svg>

                    <div class="node galicia">
                        <div class="node-pulse"></div>
                        <div class="node-dot"></div>
                        <div class="node-label">GALICIA: EXPORTANDO</div>
                    </div>

                    <div class="node madrid">
                        <div class="node-pulse"></div>
                        <div class="node-dot"></div>
                        <div class="node-label">MADRID: 4.2 GW DEMANDA</div>
                    </div>

                    <div class="node andalucia">
                        <div class="node-pulse"></div>
                        <div class="node-dot"></div>
                        <div class="node-label">ANDALUCÍA: +SOLAR</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lógica para animar los datos y dar sensación de "Tiempo Real"
        const priceEl = document.getElementById('price-val');
        
        const windVal = document.getElementById('wind-val');
        const windBar = document.getElementById('wind-bar');
        
        const solarVal = document.getElementById('solar-val');
        const solarBar = document.getElementById('solar-bar');
        
        const gasVal = document.getElementById('gas-val');
        const gasBar = document.getElementById('gas-bar');

        let currentPrice = 0.145;
        let wind = 42;
        let solar = 35;
        let gas = 12;

        setInterval(() => {
            // Simulamos fluctuación de precio
            currentPrice = currentPrice + (Math.random() * 0.006 - 0.003);
            priceEl.innerText = currentPrice.toFixed(3);

            // Simulamos fluctuación de energía (+- 2%)
            wind = Math.max(0, Math.min(100, wind + (Math.random() * 2 - 1)));
            solar = Math.max(0, Math.min(100, solar + (Math.random() * 2 - 1)));
            gas = Math.max(0, Math.min(100, gas + (Math.random() * 2 - 1)));

            windVal.innerText = wind.toFixed(1);
            windBar.style.width = wind + '%';

            solarVal.innerText = solar.toFixed(1);
            solarBar.style.width = solar + '%';

            gasVal.innerText = gas.toFixed(1);
            gasBar.style.width = gas + '%';

        }, 3000); // Se actualiza cada 3 segundos
    </script>
</body>
</html>
